name: AgentWeb CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Static syntax check
        run: python -m compileall agentweb tests
      - name: Tests
        run: python -m pytest -q
